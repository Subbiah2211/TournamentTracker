spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/TournamentTracker}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:Vibhav1303#}
spring.datasource.driver-class-name=${DB_DRIVER_CLASS_NAME:org.postgresql.Driver}

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Force Spring Boot to listen to Cloud Run's dynamic port variable
server.port=${PORT:8080}

# Frontend base URL for generating tournament links (override with FRONTEND_BASE_URL env var in production)
app.frontend.base-url=${FRONTEND_BASE_URL:http://localhost:5173}